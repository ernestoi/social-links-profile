<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Heebo:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>Social links profile</title>
</head>
<body>
    <main class="content">
        <section class="content-cards">
            <article class="content-card">
                <div class="card-img">
                    <img src="img/avatar-jessica.jpeg" alt="Imagen de usuario">
                </div>
                <div class="user-info">
                    <h1 class="user-name">
                        Jessica Randall
                    </h1>
                    <h2 class="user-country">
                        London, United Kingdom
                    </h2>
                </div>
                <p class="autor-about">''Front-end end developer and avid reader.''</p>
                <div class="user-social-links">
                    <a href="#" class="social-networks">GitHub</a>
                    <a href="#" class="social-networks">Frontend Mentor</a>
                    <a href="#" class="social-networks">Linkedln</a>
                    <a href="#" class="social-networks">Twitter</a>
                    <a href="#" class="social-networks">Instagram</a>
                </div>
            </article>
        </section>
    </main>
</body>
</html>
